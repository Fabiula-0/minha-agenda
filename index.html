<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Agenda</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 320px; scroll-behavior: smooth; }
        
        .tabs { display: flex; background: #fff; border-bottom: 2px solid #ddd; position: sticky; top: 0; z-index: 900; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #666; cursor: pointer; }
        .tab.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #f8fafc; }

        .dia-divisor { 
            background: #e2e8f0; padding: 10px 15px; 
            margin: 20px 10px 10px 10px;
            font-weight: bold; font-size: 0.9rem; color: #475569;
            text-transform: capitalize; border-radius: 6px;
        }
        .dia-divisor.hoje { background: #2563eb; color: white; }

        .list { display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        
        .item { 
            background: white; padding: 16px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: space-between; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.08); border-left: 6px solid #2563eb; 
        }
        
        .item.now { border-left-color: #059669; background: #f0fdf4; font-weight: bold; border-left-width: 10px; }
        .item.past { border-left-color: #94a3b8; opacity: 0.7; background: #f9f9f9; }
        .item.done { border-left-color: #94a3b8; opacity: 0.5; }
        .item.no-date { border-left-color: #f59e0b; }

        .info { flex: 1; }
        .name { font-size: 1.05rem; color: #1a1a1a; display: block; margin-bottom: 4px; }
        .name.riscado { text-decoration: line-through; color: #888; }
        .time-label { font-size: 0.85rem; color: #666; font-weight: 500; }

        .actions { display: flex; gap: 15px; align-items: center; }
        .btn-action { font-size: 1.2rem; cursor: pointer; padding: 5px; }
        .check-btn { width: 38px; height: 38px; border: 2px solid #cbd5e1; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #fff; font-weight: bold; }
        .check-btn.active { background: #059669; color: white; border-color: #059669; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 -5px 20px rgba(0,0,0,0.15); z-index: 1000; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; outline: none; background: #fff; }
        
        .row { display: flex; gap: 8px; width: 100%; }
        .col-data { flex: 2; }
        .col-hora, .col-min { flex: 1; }

        .btn-main { background: #2563eb; color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; width: 100%; margin-top: 5px; }
        .btn-edit { background: #f59e0b; }
        
        .backup-row { display: flex; gap: 10px; margin-top: 5px; }
        .btn-backup { flex: 1; padding: 8px; font-size: 11px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; color: #475569; font-weight: bold; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('agenda', this)">📅 Agenda</div>
        <div class="tab" onclick="switchTab('banco', this)">💡 Ideias</div>
    </div>

    <div id="view-agenda">
        <div id="minhaLista"></div>
    </div>

    <div id="view-banco" class="hidden">
        <div class="list" id="listaBanco"></div>
    </div>

    <div class="footer">
        <input type="text" id="inpNome" placeholder="O que vai fazer?">
        <div class="row">
            <div class="col-data"><input type="date" id="inpData"></div>
            <div class="col-hora"><select id="selHora"></select></div>
            <div class="col-min"><select id="selMin"></select></div>
        </div>
        <select id="inpRepetir">
            <option value="none">Não repetir</option>
            <option value="diario">Repetir Todo Dia</option>
            <option value="semanal">Repetir Toda Semana</option>
            <option value="mensal">Repetir Todo Mês</option>
        </select>
        <button id="btnSalvar" class="btn-main" onclick="adicionar()">AGENDAR</button>
        <button id="btnCancelarEdicao" class="hidden" onclick="cancelarEdicao()" style="background:#888; color:white; border:none; padding:8px; border-radius:8px; font-weight:bold;">CANCELAR EDIÇÃO</button>
        
        <div class="backup-row">
            <button class="btn-backup" onclick="exportarDados()">💾 Exportar Backup</button>
            <button class="btn-backup" onclick="importarDados()">📂 Importar Backup</button>
        </div>
    </div>

<script>
    let agenda = JSON.parse(localStorage.getItem('agenda_vFinal')) || [];
    let editandoIndex = -1;
    
    const sh = document.getElementById('selHora');
    const sm = document.getElementById('selMin');
    for(let i=0; i<24; i++) sh.innerHTML += `<option value="${i<10?'0'+i:i}">${i<10?'0'+i:i}h</option>`;
    for(let i=0; i<60; i+=5) sm.innerHTML += `<option value="${i<10?'0'+i:i}">${i<10?'0'+i:i}m</option>`;

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('view-agenda').classList.toggle('hidden', tab !== 'agenda');
        document.getElementById('view-banco').classList.toggle('hidden', tab !== 'banco');
    }

    function renderizar(focarProxima = false) {
        const listaAg = document.getElementById('minhaLista');
        const listaBa = document.getElementById('listaBanco');
        const agora = new Date();
        const hojeStr = agora.toLocaleDateString('pt-BR');

        agenda.forEach(item => {
            if (item.timestamp && !item.concluido) {
                let d = new Date(item.timestamp);
                let meiaNoiteHoje = new Date(agora.getFullYear(), agora.getMonth(), agora.getDate()).getTime();
                if (new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime() < meiaNoiteHoje) {
                    d.setFullYear(agora.getFullYear(), agora.getMonth(), agora.getDate());
                    item.timestamp = d.getTime();
                }
            }
        });

        agenda.sort((a, b) => (a.timestamp || 9999999999999) - (b.timestamp || 9999999999999));
        listaAg.innerHTML = ''; listaBa.innerHTML = '';
        let ultimoDia = "";
        let containerAgenda = null;
        let idFoco = null;

        agenda.forEach((item, index) => {
            const dt = item.timestamp ? new Date(item.timestamp) : null;
            const diff = dt ? (dt - agora) / 60000 : null;
            let classe = 'item';
            let status = 'future';

            if (item.concluido) classe += ' done';
            else if (dt) {
                if (diff > -20 && diff < 20) { classe += ' now'; status = 'now'; }
                else if (dt < agora) { classe += ' past'; status = 'past'; }
                else status = 'pending';
            }

            // Identifica a primeira tarefa pendente ou atual para focar
            if (!idFoco && !item.concluido && dt && status !== 'past') {
                idFoco = `item-${index}`;
            }

            const html = `
                <div class="info" id="item-${index}">
                    <span class="name ${item.concluido ? 'riscado' : ''}">${item.name}</span>
                    <span class="time-label">${dt ? dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) : 'Ideia'}</span>
                </div>
                <div class="actions">
                    <span class="btn-action" onclick="prepararEdicao(${index})">✏️</span>
                    <span class="btn-action" onclick="excluir(${index})">🗑️</span>
                    ${dt ? `<div class="check-btn ${item.concluido ? 'active' : ''}" onclick="toggle(${index})">${item.concluido ? '✓' : ''}</div>` : ''}
                </div>`;

            if (dt) {
                const diaAtual = dt.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'short'});
                if (diaAtual !== ultimoDia) {
                    const isHoje = dt.toLocaleDateString('pt-BR') === hojeStr;
                    const divisor = document.createElement('div');
                    divisor.className = `dia-divisor ${isHoje?'hoje':''}`;
                    divisor.innerText = `${isHoje?'Hoje - ':''}${diaAtual}`;
                    listaAg.appendChild(divisor);
                    containerAgenda = document.createElement('div');
                    containerAgenda.className = 'list';
                    listaAg.appendChild(containerAgenda);
                    ultimoDia = diaAtual;
                }
                containerAgenda.innerHTML += `<div class="${classe}">${html}</div>`;
            } else {
                listaBa.innerHTML += `<div class="item no-date">${html}</div>`;
            }
        });
        localStorage.setItem('agenda_vFinal', JSON.stringify(agenda));

        // Rola até a próxima tarefa apenas se for a primeira abertura ou solicitado
        if (focarProxima && idFoco) {
            setTimeout(() => {
                const el = document.getElementById(idFoco);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }
    }

    function adicionar() {
        const nome = document.getElementById('inpNome').value;
        const data = document.getElementById('inpData').value;
        const h = document.getElementById('selHora').value;
        const m = document.getElementById('selMin').value;
        const repetir = document.getElementById('inpRepetir').value;
        if (!nome) return;
        let ts = null;
        if (data) {
            const [y, mes, d] = data.split('-');
            ts = new Date(y, mes-1, d, h, m).getTime();
        }
        const novoItem = { name: nome, timestamp: ts, concluido: false, repetir: repetir };
        if (editandoIndex > -1) {
            agenda[editandoIndex] = novoItem;
            cancelarEdicao();
        } else {
            agenda.push(novoItem);
        }
        document.getElementById('inpNome').value = '';
        
        // Renderiza sem focar, mantendo a tela onde está
        renderizar(false); 
    }

    function prepararEdicao(i) {
        editandoIndex = i;
        const item = agenda[i];
        document.getElementById('inpNome').value = item.name;
        document.getElementById('inpRepetir').value = item.repetir;
        if (item.timestamp) {
            const dt = new Date(item.timestamp);
            document.getElementById('inpData').value = dt.toISOString().split('T')[0];
            document.getElementById('selHora').value = dt.getHours().toString().padStart(2, '0');
            document.getElementById('selMin').value = (Math.floor(dt.getMinutes()/5)*5).toString().padStart(2, '0');
        }
        document.getElementById('btnSalvar').innerText = "SALVAR ALTERAÇÃO";
        document.getElementById('btnSalvar').classList.add('btn-edit');
        document.getElementById('btnCancelarEdicao').classList.remove('hidden');
    }

    function cancelarEdicao() {
        editandoIndex = -1;
        document.getElementById('inpNome').value = '';
        document.getElementById('btnSalvar').innerText = "AGENDAR";
        document.getElementById('btnSalvar').classList.remove('btn-edit');
        document.getElementById('btnCancelarEdicao').classList.add('hidden');
    }

    function toggle(i) {
        const item = agenda[i];
        item.concluido = !item.concluido;
        if (item.concluido && item.repetir !== 'none') {
            let nD = new Date(item.timestamp);
            if (item.repetir === 'diario') nD.setDate(nD.getDate() + 1);
            if (item.repetir === 'semanal') nD.setDate(nD.getDate() + 7);
            if (item.repetir === 'mensal') nD.setMonth(nD.getMonth() + 1);
            agenda.push({ name: item.name, timestamp: nD.getTime(), concluido: false, repetir: item.repetir });
        }
        renderizar(false);
    }

    function excluir(i) { if(confirm("Apagar?")) { agenda.splice(i, 1); renderizar(false); } }

    function exportarDados() {
        const dados = localStorage.getItem('agenda_vFinal');
        navigator.clipboard.writeText(dados).then(() => alert("Backup copiado!"));
    }

    function importarDados() {
        const codigo = prompt("Cole o backup:");
        if (codigo) {
            try { agenda = JSON.parse(codigo); renderizar(true); } catch(e) { alert("Erro!"); }
        }
    }

    const d = new Date();
    document.getElementById('inpData').value = d.toISOString().split('T')[0];
    
    // Primeira abertura: renderiza e foca na próxima tarefa
    renderizar(true);
    
    setInterval(() => renderizar(false), 60000);
</script>
</body>
</html>
